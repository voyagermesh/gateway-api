                          description: Kind is the kind of the referent.  For example,
                            "ConfigMap".
                          maxLength: 63
                          minLength: 1
                          pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                          type: string
                        name:
                          description: Name is the metadata.name of the referenced
                            config map.
                          maxLength: 253
                          minLength: 1
                          type: string
                        namespace:
                          description: "Namespace is the namespace of the referenced
                            object. When unspecified, the local namespace is inferred.
                            \n Note that when a namespace different than the local
                            namespace is specified, a ReferenceGrant object is required
                            in the referent namespace to allow that namespace's owner
                            to accept the reference. See the ReferenceGrant documentation
                            for details. \n Support: Core"
