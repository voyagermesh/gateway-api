                      Gateway uses to connect to the backend.  It represents the fully
                      qualified domain name of a network host, as defined by RFC1123
                      - except that numeric IP addresses are not allowed. Each label
                      of the FQDN must consist of lower case alphanumeric characters
                      or '-', and must start and end with an alphanumeric character.
                      \ No other punctuation is allowed. Wildcard domain names are
                      specifically disallowed. \n It specifies the hostname that may
                      authenticate, and must be in the certificate served by the matching
                      backend. \n Support: Core - A required value used by the Gateway
                      to connect to the backend when a BackendTLSPolicy is specified."
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  standardCerts:
                    description: "StandardCerts specifies whether system CA certificates
                      may be used in the TLS handshake between the gateway and backend
                      pod. \n If StandardCerts is unspecified or set to \"\", then
                      CertRefs must be specified with at least one entry for a valid
                      configuration. If StandardCerts is unspecified or set to \"\",
                      then CertRefs must be specified.  Only one of CertRefs or StandardCerts
                      may be specified, not both. \n StandardCerts must be set to
                      \"System\" when CertRefs is unspecified. \n If StandardCerts
                      is set to \"System\", then the system trusted certificates should
                      be used. If there are none, or the implementation doesn't define
                      system trusted certificates, then a TLS connection must fail.
                      \n Support: Core - An optional value to specify whether to use
                      system certificates or not. \n Support: Implementation-specific
                      (In the absence of support for usable system certs, may be ignored.
                      Service mesh may ignore.)"
                    enum:
                    - System
                    type: string
                required:
                - hostname
                type: object
            required:
            - targetRef
            - tls
            type: object
          status:
