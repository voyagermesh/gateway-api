                      objects that contain PEM-encoded TLS certificates, which are
                      used to establish a TLS handshake between the gateway and backend
                      pod. \n If CertRefs is empty or unspecified, then StandardCerts
                      must be specified.  Only one of CertRefs or StandardCerts may
                      be specified, not both. \n If CertRefs is empty or unspecified,
                      then system trusted certificates should be used. If there are
                      none, or the implementation doesn't define system trusted certificates,
                      then a TLS connection must fail. \n References to a resource
                      in a different namespace are invalid. \n A single CertRef to
                      a Kubernetes ConfigMap kind has \"Core\" support.  Implementations
                      MAY choose to support attaching multiple certificates to a backend,
                      but this behavior is implementation-specific.  Also implementation-specific
                      is a CertRef of other object kinds, e.g. Secret. \n Support:
                      Core - An optional single reference to a Kubernetes ConfigMap.
                      \n Support: Implementation-specific (No reference, more than
                      one reference, or resource types other than ConfigMaps. Service
                      mesh may ignore.)"
                    items:
